{% extends "cabinet/base.html" %}
{% block title %}Язык — {{ app_name }}{% endblock %}
{% block content %}
<div class="stack-lg">
  <div class="page-header"><h2>Язык</h2></div>

  <div class="lang-list">
    <button class="lang-btn {% if user.language in (None, 'ru') %}active{% endif %}" onclick="setLang('ru', event)">
      <span class="lang-emoji">🇷🇺</span>
      <span>Русский</span>
    </button>
    <button class="lang-btn {% if user.language == 'en' %}active{% endif %}" onclick="setLang('en', event)">
      <span class="lang-emoji">🇬🇧</span>
      <span>English</span>
    </button>
    <button class="lang-btn {% if user.language == 'fa' %}active{% endif %}" onclick="setLang('fa', event)">
      <span class="lang-emoji">🇮🇷</span>
      <span>فارسی</span>
    </button>
  </div>
  <div id="lang-result" style="text-align:center"></div>
</div>

<script>
async function setLang(lang, evt) {
  var fd = new FormData();
  fd.append('lang', lang);
  try {
    var r = await cabinetJson('/cabinet/language', {method:'POST', body:fd});
    if (r.data.ok) {
      document.querySelectorAll('.lang-btn').forEach(function(b) { b.classList.remove('active'); });
      (evt.target.closest('.lang-btn') || evt.target).classList.add('active');
      document.getElementById('lang-result').innerHTML = '<span class="text-success">Язык изменён</span>';
    }
  } catch(e) {}
}
</script>
{% endblock %}
