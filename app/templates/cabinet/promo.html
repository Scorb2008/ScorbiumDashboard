{% extends "cabinet/base.html" %}
{% block title %}Промокод — {{ app_name }}{% endblock %}
{% block content %}
<div class="stack-lg">
  <div class="page-header"><h2>Промокод</h2></div>

  <div class="card">
    <form onsubmit="return applyPromo(event)" class="stack">
      <input type="text" id="promo-code" class="input" placeholder="Введите промокод" required autocomplete="off">
      <button type="submit" class="btn btn-primary w-full">Активировать</button>
      <div id="promo-result"></div>
    </form>
  </div>
</div>

<script>
async function applyPromo(event) {
  event.preventDefault();
  var code = document.getElementById('promo-code').value.trim();
  var result = document.getElementById('promo-result');
  var fd = new FormData();
  fd.append('code', code);
  try {
    var r = await cabinetJson('/cabinet/promo/apply', {method:'POST', body:fd});
    setMsg(result, r.data.ok, r.data.message || 'Ошибка');
  } catch(e) { setMsg(result, false, 'Ошибка сети'); }
}
</script>
{% endblock %}
